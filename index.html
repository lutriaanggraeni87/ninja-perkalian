      /* Animasi Tebas Membesar & Lambat (Lebar & Berwibawa) */
.animasi-tebas { 
  /* Durasi diubah ke 0.6 detik agar gerakan menebas terlihat jelas oleh mata */
  animation: gerakanMenebas 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
}

@keyframes gerakanMenebas { 
  0% { 
    transform: scale(1); 
    filter: brightness(1);
  } 
  40% { 
    /* Puncak tebasan: membesar, sedikit naik, dan bersinar */
    transform: scale(1.6) translateY(-20px) rotate(5deg); 
    filter: brightness(1.3) drop-shadow(0 0 15px #f1c40f);
  }
  70% {
    /* Menahan posisi tebas sebentar agar dramatis */
    transform: scale(1.55) translateY(-15px) rotate(5deg);
  }
  100% { 
    transform: scale(1); 
    filter: brightness(1);
  } 
}

     function jalankanTimer() {
  waktuSisa = totalWaktuPerSoal;
  var bar = document.getElementById('bar-timer');
  var gulungan = document.getElementById('area-soal'); // Ambil elemen gulungan
  
  bar.style.width = '100%'; 
  bar.style.backgroundColor = '#2ecc71'; 
  
  // Pastikan gulungan terbuka penuh saat soal baru mulai
  gulungan.style.transform = "scaleX(1)"; 
  gulungan.classList.remove('animasi-jatuh');

  clearInterval(intervalTimer);
  
  intervalTimer = setInterval(function() {
    waktuSisa -= 0.1;
    var persentase = (waktuSisa / totalWaktuPerSoal) * 100;
    var skalaGulung = waktuSisa / totalWaktuPerSoal; // Nilai dari 1 ke 0

    // 1. Update Bar Timer
    bar.style.width = persentase + '%';

    // 2. EFEK MENGGULUNG: Gulungan mengecil ke tengah mengikuti waktu
    if (skalaGulung >= 0) {
      gulungan.style.transform = "scaleX(" + skalaGulung + ")";
    }

    // Perubahan warna bar
    if (persentase <= 40 && persentase > 15) { 
      bar.style.backgroundColor = '#f1c40f'; 
    } 
    else if (persentase <= 15) { 
      bar.style.backgroundColor = '#e74c3c'; 
    } 

    // 3. Jika Waktu Habis
    if (waktuSisa <= 0) { 
      clearInterval(intervalTimer); 
      
      // Gulungan jatuh dalam posisi sudah tergulung (skala 0)
      gulungan.classList.add('animasi-jatuh'); 
      
      // Beri jeda sedikit sebelum eksekusi gagal agar animasinya terlihat
      setTimeout(function() {
        eksekusiGagal(); 
      }, 500);
    }
  }, 100);
}

  var sV = (iS > 0) ? urutanS[iS - 1] : "Putih";

  if (levelSekarang === "Hijau" || levelSekarang === "Biru") sV = "Putih";
  else if (levelSekarang === "Coklat") sV = "Hijau";
  else if (levelSekarang === "Hitam") sV = "Coklat";
  else if (levelSekarang === "Post-Test") sV = "Hitam";

      <td style="padding: 8px; color: #27ae60; font-weight: bold;">${ninja.skor || 0}</td>

  });
  
  console.log("Tabel Berhasil Dirender!");

        levelSekarang = urutanLevel[indeksLevelSekarang];
        indeksSoalSekarang = 0; 
        skorSaatIni = 0; // Skor mulai dari 0 lagi tiap sabuk

        // 2. Ambil data soal yang baru
        dataSoalAktif = dataSemuaSoal[levelSekarang];

        // 3. Update Teks UI (Sabuk & Judul)
        document.getElementById('tampil-sabuk').innerText = "Sabuk " + levelSekarang;
        if(document.getElementById('teks-ujian')) {
          document.getElementById('teks-ujian').innerText = "Ujian Sabuk " + levelSekarang + "!";
        }

        // 4. KUNCI UTAMA: Sembunyikan Area Selesai & Tombol-tombolnya
        document.getElementById('area-selesai').style.display = 'none';
        
        // 5. Tampilkan kembali elemen game yang mungkin tadi disembunyikan
        document.getElementById('papan-kontrol-css').style.display = 'grid';
        document.getElementById('area-soal').style.display = 'flex';
        document.getElementById('wadah-timer').style.display = 'block';

        // 6. Jalankan soal pertama
        muatSoal();
        
        console.log("Berhasil pindah ke Sabuk: " + levelSekarang);
    } else {
        alert("Selamat Master Ninja! Semua ujian sabuk telah diselesaikan.");
        kembaliKeAwal();
    }
}

      function tekanAngka(angka) {
        if (!statusSoalAktif) return;
        if (inputAngka.length < 2) {
          inputAngka += angka.toString();
          document.getElementById('teks-jawaban').innerText = inputAngka;
          cekJawaban(); 
        }
      }

      function hapusAngka() {
        if (!statusSoalAktif) return;
        inputAngka = inputAngka.slice(0, -1); 
        document.getElementById('teks-jawaban').innerText = inputAngka;
      }

      function cekJawaban() {
  var jawabanBenar = dataSoalAktif[indeksSoalSekarang].jawaban;
  
  if (parseInt(inputAngka) === jawabanBenar) {
    statusSoalAktif = false;
    if(typeof intervalTimer !== 'undefined') clearInterval(intervalTimer); 
    skorSaatIni += 10; 
    
    var feedback = document.getElementById('pesan-feedback');
    if(feedback) {
      feedback.innerText = "TRING!"; 
      feedback.className = "benar-warna"; 
      feedback.style.display = 'block';
    }
    
    var imgKarakter = document.getElementById('karakter-pemain');
    
    if (imgKarakter && asetKarakter[karakterPilih]) {
        // 1. Tentukan sabuk yang MENEBAS (Logika IF sesuai permintaan Ibu)     
      // --- REVISI LOGIKA SABUK TEBAS ---
let sabukTebas = "Putih"; 
if (levelSekarang === "Kuning") {
    sabukTebas = "Putih"; 
} else if (levelSekarang === "Hijau") {
    sabukTebas = "Kuning"; 
} else if (levelSekarang === "Biru") {
    sabukTebas = "Hijau";  
} else if (levelSekarang === "Coklat") {
    sabukTebas = "Biru";   
} else if (levelSekarang === "Hitam") {
    sabukTebas = "Coklat"; 
} else if (levelSekarang === "Post-Test") {
    sabukTebas = "Hitam"; // Saat Post-Test, karakter pakai visual Sabuk Hitam
}
      

        // 2. EKSEKUSI TEBAS (Kita beri waktu 1.2 detik agar gerakan terlihat)
        imgKarakter.src = asetKarakter[karakterPilih][sabukTebas]["tebas"];
        
        // Tambahkan efek sedikit membesar saat menebas agar terlihat lebih kuat
        imgKarakter.style.transform = "translateX(-50%) scale(1.1)"; 

        // 3. Animasi Gulungan
        var gulungan = document.getElementById('area-soal');
        if(gulungan) {
            gulungan.classList.remove('animasi-tertebas', 'animasi-jatuh');
            void gulungan.offsetWidth; 
            gulungan.classList.add('animasi-tertebas');
        }

        // 4. Suara
        var sfxTring = document.getElementById('sfx-tring');
        if (sfxTring) {
            sfxTring.currentTime = 0; 
            sfxTring.play().catch(function(e) { console.log("Audio tertahan"); });
        }
        
        // 5. JEDA DIPERLAMBAT (Dari 800ms menjadi 1200ms agar mata sempat melihat)
        setTimeout(function() {
          if(feedback) feedback.style.display = 'none';
          
          // Kembalikan ukuran normal
          imgKarakter.style.transform = "translateX(-50%) scale(1)";

          // Tentukan Sabuk untuk posisi DIAM (Kembali ke Putih untuk Hijau/Biru sesuai request)
          let sabukDiamLagi = sabukTebas;
          if (levelSekarang === "Hijau" || levelSekarang === "Biru") {
              sabukDiamLagi = "Putih";
          }

          // Kembali ke diam
          imgKarakter.src = asetKarakter[karakterPilih][sabukDiamLagi]["diam"];
          
          indeksSoalSekarang++;
          muatSoal(); 
        }, 1800); // 
    }
  }
}
    </script>
  </body>
