<!DOCTYPE html>
<html>
<head>
  <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    
   <style>
      /* --- Gaya Dasar --- */
      body { margin: 0; padding: 0; background-color: #000; font-family: 'Comic Sans MS', sans-serif; display: block; justify-content: center; align-items: center; height: auto; overflow: auto; color: white; }
      #game-container { 
        width: 100%; 
        max-width: 400px; 
        min-height: 100vh;
        margin: 0 auto; 
        background-color: #1a1a1a; 
        position: relative; 
        overflow: visible; 
        box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        padding-bottom: 50px; 
      }
      .layar { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-size: cover; background-position: center; }
      #layar-judul { background-image: url('https://drive.google.com/thumbnail?id=1-UYPyRH8oqdFND2QS9Xns4-1LH067xiX&sz=w800'); }
      #layar-cerita { background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000; cursor: pointer; }
      #layar-gameplay { background-image: url('https://drive.google.com/thumbnail?id=1LqU_cpFfFmx4N2f2cCKycL12aDkKKcN0&sz=w800'); justify-content: flex-start; padding-top: 5px; padding-bottom: 40px; }
      
      .overlay { background: rgba(0, 0, 0, 0.4); width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
      .konten-di-atas { z-index: 2; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
      .logo-game { width: 85%; max-width: 300px; margin-bottom: 5px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); }
      .teks-kreator { font-size: 12px; margin-bottom: 10px; color: #f1c40f; background-color: rgba(92, 58, 33, 0.9); padding: 5px 15px; border-radius: 8px; border: 2px solid #3e2723; font-weight: bold; }
      
      .input-form { width: 70%; padding: 8px; font-size: 16px; text-align: center; border-radius: 10px; border: 3px solid #f1c40f; margin-bottom: 8px; font-weight: bold; font-family: 'Comic Sans MS', sans-serif; outline: none; color: #333;}
      
      .area-pilih-karakter { display: flex; gap: 15px; margin-bottom: 10px; }
      .kartu-karakter { background: rgba(0,0,0,0.6); border: 3px solid #7f8c8d; border-radius: 10px; padding: 5px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; width: 80px; }
      .kartu-karakter img { width: 60px; height: 60px; object-fit: contain; }
      .kartu-karakter span { font-size: 14px; font-weight: bold; color: white; margin-top: 5px; }
      .kartu-karakter.dipilih { border-color: #f1c40f; background: rgba(241, 196, 15, 0.3); transform: scale(1.1); box-shadow: 0 0 10px #f1c40f; }

      .btn-ninja { background-color: #e74c3c; color: white; padding: 10px 30px; font-size: 18px; font-weight: bold; border: 2px solid #fff; border-radius: 10px; cursor: pointer; box-shadow: 0 5px #c0392b; margin-top: 5px; font-family: 'Luckiest Guy', cursive; letter-spacing: 1px;}
      .btn-ninja:active { box-shadow: 0 2px #c0392b; transform: translateY(3px); }

      /* --- PERBAIKAN POSISI ATAS --- */
      #info-pemain { 
        position: relative; 
        width: 90%; 
        margin-top: 10px; 
        background: rgba(0,0,0,0.85); 
        border: 2px solid #f1c40f; 
        padding: 8px 15px; 
        border-radius: 12px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 12px; 
        z-index: 20; 
      }
      #ikon-sabuk-ui { height: 35px; width: auto; object-fit: contain; }
      #teks-ujian { font-size: 20px; color: #f1c40f; font-weight: bold; text-shadow: 2px 2px 4px #000; margin: 10px 0 5px 0; text-align: center; z-index: 10; }

      /* TIMER BAR */
      #wadah-timer { width: 70%; height: 15px; background-color: #333; border-radius: 10px; border: 2px solid #fff; margin-bottom: 5px; overflow: hidden; z-index: 10; position: relative; }
      #bar-timer { height: 100%; width: 100%; background-color: #2ecc71; transition: width 0.1s linear, background-color 0.3s; }

      /* AREA SOAL */
      #area-soal { background-image: url('https://drive.google.com/thumbnail?id=1dwM5Ve8GQIxDW9YbCse_LD_NXYBOxXuM&sz=w600'); background-size: 100% 100%; background-position: center; width: 95%; max-width: 380px; height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8)); transform-origin: center; position: relative; margin-top: 5px;}
      #teks-pertanyaan { font-size: 30px; font-weight: 800; color: #1a1a1a; margin-top: 15px; letter-spacing: 3px; font-family: 'Luckiest Guy', cursive; }
      #teks-jawaban { font-family: 'Luckiest Guy', cursive; font-size: 38px; color: #c0392b; min-height: 45px; margin-top: 5px; text-shadow: 1px 1px 0px #fff; }
      
      /* --- AREA NINJA (FIXED) --- */
      #karakter-pemain {
        height: 160px;
        width: auto;
        position: absolute;
        bottom: 280px; /* Posisi diatur agar tidak tertutup tombol */
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: block;
      }

      #papan-kontrol-css {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        width: 260px;
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
      }

      .btn-css { background-color: #2980b9; color: white; font-size: 22px; font-weight: bold; border: 2px solid #1a5276; border-radius: 10px; padding: 8px 0; cursor: pointer; box-shadow: 0 5px #154360; font-family: 'Comic Sans MS', sans-serif; }
      .btn-css:active { transform: translateY(5px); box-shadow: 0 0 #154360; }
      .btn-css-merah { background-color: #e74c3c; border-color: #922b21; box-shadow: 0 5px #922b21; }

      /* --- LEADERBOARD (FIXED COLORS) --- */
      #area-selesai {
          display: none;
          flex-direction: column;
          align-items: center;
          background: #fff8e1; /* Latar Krem */
          padding: 20px;
          overflow-y: auto;
          max-height: 90vh;
          border-radius: 15px;
          z-index: 2000;
          color: #333;
      }
      .tabel-leaderboard { width: 100%; border-collapse: collapse; margin: 20px 0; background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
      .tabel-leaderboard th { background-color: #d35400; color: white; padding: 10px; }
      .tabel-leaderboard td { border: 1px solid #ddd; padding: 10px; font-weight: bold; color: #2c3e50 !important; text-align: center; }
      #isi-lb td:first-child { color: #c0392b !important; text-align: left; }

      .footer-sekolah { position: absolute; bottom: 0; left: 0; width: 100%; background-color: #8e44ad; color: white; text-align: center; padding: 10px 0; font-size: 12px; font-weight: bold; z-index: 2000; }
      
      .animasi-tebas { animation: gerakanMenebas 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
      @keyframes gerakanMenebas { 
        0% { transform: translateX(-50%) scale(1); } 
        40% { transform: translateX(-50%) scale(1.6) translateY(-20px); filter: brightness(1.3); }
        100% { transform: translateX(-50%) scale(1); } 
      }
    </style>
  </head>
  <body>
    <audio id="sfx-tring" src="https://actions.google.com/sounds/v1/cartoon/ding.ogg"></audio>
    <audio id="sfx-gagal" src="https://actions.google.com/sounds/v1/cartoon/slip.ogg"></audio>

    <div id="game-container">
      <div id="layar-judul" class="layar">
        <div class="overlay"></div>
        <div class="konten-di-atas" style="justify-content: center;">
          <img src="https://drive.google.com/thumbnail?id=12tlWKH3sBQF4cvnu0UYqUyuHFOYKpbmi&sz=w600" alt="Logo Ninja" class="logo-game">
          <div class="teks-kreator">Dibuat oleh : Lutria Anggraeni, S.Pd.Gr</div>
          <input type="text" id="input-nama" class="input-form" placeholder="Siapa namamu?" autocomplete="off">
          <input type="text" id="input-kelas" class="input-form" placeholder="Kelas berapa?" autocomplete="off">
          <div class="area-pilih-karakter">
            <div class="kartu-karakter dipilih" id="pilih-ken" onclick="gantiKarakterPilihan('ken')">
              <img src="https://drive.google.com/thumbnail?id=1PpDXf_fxOs7YxpG79DZM8cUAlcznfwOb&sz=w100" alt="Ken"><span>KEN</span>
            </div>
            <div class="kartu-karakter" id="pilih-mei" onclick="gantiKarakterPilihan('mei')">
              <img src="https://drive.google.com/thumbnail?id=1C-F3ikyFszLzzDkxA9O0G7yRSzAuc30m&sz=w100" alt="Mei"><span>MEI</span>
            </div>
          </div>
          <button class="btn-ninja" onclick="mulaiCerita()">MULAI MAIN</button>
        </div>
      </div>

      <div id="layar-cerita" class="layar" style="display: none;" onclick="lanjutCerita()"></div>

      <div id="layar-gameplay" class="layar" style="display: none;">
        <div id="info-pemain">
            <img id="ikon-sabuk-ui" src="" alt="Sabuk">
            <span id="tampil-sabuk">Sabuk Putih</span> | <span id="tampil-nama-pemain" style="color: #f1c40f;"></span>
        </div>
        <div class="konten-di-atas">
          <div id="teks-ujian">Ujian Sabuk Putih!</div>
          <div id="wadah-timer"><div id="bar-timer"></div></div>
          <div id="area-soal">
            <div id="teks-pertanyaan">Siap?</div>
            <div id="teks-jawaban"></div>
          </div>
          <img id="karakter-pemain" src="" alt="Karakter">
          <div id="papan-kontrol-css">
            <button class="btn-css" onclick="tekanAngka(1)">1</button>
            <button class="btn-css" onclick="tekanAngka(2)">2</button>
            <button class="btn-css" onclick="tekanAngka(3)">3</button>
            <button class="btn-css" onclick="tekanAngka(4)">4</button>
            <button class="btn-css" onclick="tekanAngka(5)">5</button>
            <button class="btn-css" onclick="tekanAngka(6)">6</button>
            <button class="btn-css" onclick="tekanAngka(7)">7</button>
            <button class="btn-css" onclick="tekanAngka(8)">8</button>
            <button class="btn-css" onclick="tekanAngka(9)">9</button>
            <button class="btn-css" style="background-color: #f39c12; font-size: 14px;" onclick="lewatiSoal()">LEWATI</button>
            <button class="btn-css" onclick="tekanAngka(0)">0</button>
            <button class="btn-css btn-css-merah" onclick="hapusAngka()">X</button>
          </div>
        </div>
      </div>

      <div id="area-selesai" class="layar">
        <h1 id="judul-selesai" style="color: #c0392b;">LULUS!</h1>
        <div id="skor-akhir" style="font-size: 24px; font-weight: bold; margin: 10px 0;">Skor: 0</div>
        <div id="tampil-leaderboard" style="width: 100%; background: white; border-radius: 10px; padding: 10px;">
          <h3 style="text-align:center; color: #f39c12;">🏆 TOP 10 NINJA 🏆</h3>
          <table class="tabel-leaderboard">
            <thead>
              <tr><th>Nama</th><th>Kls</th><th>Sabuk</th><th>Skor</th></tr>
            </thead>
            <tbody id="isi-lb"></tbody>
          </table>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 10px;">
          <button id="btn-lanjut-level" onclick="naikKeTingkatSelanjutnya()" style="background-color: #27ae60; color: white; padding: 10px 20px; border-radius: 5px; font-family: 'Luckiest Guy';">LANJUT</button>
          <button onclick="kembaliKeAwal()" style="background-color: #e74c3c; color: white; padding: 10px 20px; border-radius: 5px; font-family: 'Luckiest Guy';">SELESAI</button>
        </div>
      </div>
      <div class="footer-sekolah">UPTD SPF SDN Kejayan 1 Pujer</div>
    </div>

    <script>

      var indeksLevelSekarang = 0;
      var levelSekarang = urutanLevel[0];
      var indeksSoalSekarang = 0, inputAngka = "", skorSaatIni = 0, waktuSisa = 0, intervalTimer, statusSoalAktif = false;

      var asetSabuk = {

        "Hitam": "https://drive.google.com/thumbnail?id=1V8XRxOpT1meU44u1TjpUhmuxNjYj6Rda&sz=w200"
      };

      var asetKarakter = {
        "ken": {
          "Putih": { "diam": "https://drive.google.com/thumbnail?id=1PpDXf_fxOs7YxpG79DZM8cUAlcznfwOb&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1Xy6RXJUmgGq_YXPQzQOhDWgI66m7Sbaa&sz=w1000" },
          "Kuning": { "diam": "https://drive.google.com/thumbnail?id=1ePU3pvr5OrYMX1aV70KN78yQ-2uHbQlO&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1oGNAeA46dFwHbxScOxkPKI7b_p-SWDy3&sz=w1000" },
          "Hijau": { "diam": "https://drive.google.com/thumbnail?id=1ePU3pvr5OrYMX1aV70KN78yQ-2uHbQlO&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1XvEtv1S7LEOhJzDNX5dXzkY9W0qOBIRC&sz=w1000" },
          "Biru": { "diam": "https://drive.google.com/thumbnail?id=1ePU3pvr5OrYMX1aV70KN78yQ-2uHbQlO&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1XJF4HiN0QaBKTYv1UWcrjM2XTLWPaF7g&sz=w1000" },
          "Coklat": { "diam": "https://drive.google.com/thumbnail?id=1ePU3pvr5OrYMX1aV70KN78yQ-2uHbQlO&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1tErUn3r6mUAvFGSnxoaPUQrROa1gMj3j&sz=w1000" },
          "Hitam": { "diam": "https://drive.google.com/thumbnail?id=1ePU3pvr5OrYMX1aV70KN78yQ-2uHbQlO&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1-cLWmC9PnlrWLmeu4sPMxg2DM3JJ4NRt&sz=w1000" }
        },
        "mei": {
          "Putih": { "diam": "https://drive.google.com/thumbnail?id=1C-F3ikyFszLzzDkxA9O0G7yRSzAuc30m&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1GPBiJl192oUyiVy2pGOXdERVhW2N87cX&sz=w1000" },
          "Kuning": { "diam": "https://drive.google.com/thumbnail?id=1gti3FFWSOvicLIq-d2BOK9BHaMJwn5Ua&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=19X2_u0WBAhtFHA123cA_rqGv_NqITSq2&sz=w1000" },
          "Hijau": { "diam": "https://drive.google.com/thumbnail?id=1gti3FFWSOvicLIq-d2BOK9BHaMJwn5Ua&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1_aXMna3kKZZN9xKI8Zjgk0pKX948zI_Y&sz=w1000" },
          "Biru": { "diam": "https://drive.google.com/thumbnail?id=1gti3FFWSOvicLIq-d2BOK9BHaMJwn5Ua&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=11s6arhqQB4N88y4mNi-YQsMezI74m8t9&sz=w1000" },
          "Coklat": { "diam": "https://drive.google.com/thumbnail?id=1gti3FFWSOvicLIq-d2BOK9BHaMJwn5Ua&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1Pvzhozq5F7v7-Gr3iMLMAbvED_7yasYo&sz=w1000" },
          "Hitam": { "diam": "https://drive.google.com/thumbnail?id=1gti3FFWSOvicLIq-d2BOK9BHaMJwn5Ua&sz=w1000", "tebas": "https://drive.google.com/thumbnail?id=1Rv56SAW3LSysUScU8Pgfq8hOT5EkHc_g&sz=w1000" }
        }
      };

      // DATA SOAL (Lengkap sesuai file Anda)
      var dataSemuaSoal = {
        "Putih": [{p:"2x3",j:6},{p:"2x5",j:10},{p:"2x4",j:8},{p:"2x6",j:12},{p:"2x7",j:14},{p:"2x8",j:16},{p:"2x9",j:18},{p:"1x9",j:9},{p:"1x8",j:8},{p:"1x7",j:7}],

        "Hijau": [{p:"5x2",j:10},{p:"6x2",j:12},{p:"5x3",j:15},{p:"6x3",j:18},{p:"5x4",j:20},{p:"6x4",j:24},{p:"5x5",j:25},{p:"6x5",j:30},{p:"5x6",j:30},{p:"6x6",j:36},{p:"5x7",j:35},{p:"6x7",j:42},{p:"5x8",j:40},{p:"6x8",j:48},{p:"5x9",j:45}],
        "Biru": [{p:"7x2",j:14},{p:"8x2",j:16},{p:"7x3",j:21},{p:"8x3",j:24},{p:"7x4",j:28},{p:"8x4",j:32},{p:"7x5",j:35},{p:"8x5",j:40},{p:"7x6",j:42},{p:"8x6",j:48},{p:"7x7",j:49},{p:"8x7",j:56},{p:"7x8",j:56},{p:"8x8",j:64},{p:"7x9",j:63},{p:"8x9",j:72}],

        "Hitam": [{p:"6x6",j:36},{p:"6x7",j:42},{p:"6x8",j:48},{p:"6x9",j:54},{p:"7x6",j:42},{p:"7x7",j:49},{p:"7x8",j:56},{p:"7x9",j:63},{p:"8x6",j:48},{p:"8x7",j:56},{p:"8x8",j:64},{p:"8x9",j:72},{p:"9x6",j:54},{p:"9x7",j:63},{p:"9x8",j:72},{p:"9x9",j:81},{p:"7x8",j:56},{p:"8x7",j:56},{p:"6x8",j:48},{p:"8x6",j:48}],
        "Post-Test": [{p:"3x8",j:24},{p:"7x4",j:28},{p:"5x6",j:30},{p:"9x3",j:27},{p:"8x8",j:64},{p:"6x7",j:42},{p:"4x9",j:36},{p:"7x7",j:49},{p:"8x5",j:40},{p:"9x6",j:54},{p:"6x8",j:48},{p:"7x9",j:63},{p:"5x5",j:25},{p:"8x4",j:32},{p:"9x9",j:81},{p:"6x6",j:36},{p:"7x8",j:56},{p:"4x4",j:16},{p:"8x9",j:72},{p:"9x7",j:63}]
      };

      var dataSoalAktif = dataSemuaSoal["Putih"];

      function gantiKarakterPilihan(p) { karakterPilih = p; document.getElementById('pilih-ken').classList.toggle('dipilih', p === 'ken'); document.getElementById('pilih-mei').classList.toggle('dipilih', p === 'mei'); }

      function mulaiCerita() { 
        namaPemain = document.getElementById('input-nama').value || "Ninja"; 
        kelasPemain = document.getElementById('input-kelas').value || "1A"; 
        document.getElementById('layar-judul').style.display = 'none';
        document.getElementById('layar-gameplay').style.display = 'flex';
        muatSoal(); 
      }

      function muatSoal() {
        if (indeksSoalSekarang >= dataSoalAktif.length) { selesaiLevel(); return; }
        statusSoalAktif = true; inputAngka = ""; 
        document.getElementById('teks-jawaban').innerText = "";
        document.getElementById('teks-pertanyaan').innerText = dataSoalAktif[indeksSoalSekarang].p;
        document.getElementById('tampil-nama-pemain').innerText = namaPemain;
        document.getElementById('teks-ujian').innerText = "Ujian Sabuk " + levelSekarang;
        document.getElementById('ikon-sabuk-ui').src = asetSabuk[levelSekarang === "Post-Test" ? "Hitam" : levelSekarang];
        
        // Logika Sabuk Diam (Putih untuk Hijau/Biru)
        let sabukVisual = levelSekarang;
        if (levelSekarang === "Hijau" || levelSekarang === "Biru") sabukVisual = "Putih";
        document.getElementById('karakter-pemain').src = asetKarakter[karakterPilih][sabukVisual === "Post-Test" ? "Hitam" : sabukVisual].diam;
